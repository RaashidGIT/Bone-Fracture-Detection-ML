<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pediatric Wrist Bone Fracture Detection</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#0f172a,#020617);
    font-family:Segoe UI, Arial;
    color:white;
    text-align:center;
}

h1{
    margin-top:30px;
}

.container{
    width:80%;
    margin:auto;
    margin-top:30px;
}

.card{
    background:#1e293b;
    padding:30px;
    border-radius:18px;
    margin-top:25px;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

.upload-box{
    border:2px dashed #3b82f6;
    padding:30px;
    border-radius:15px;
}

button{
    margin-top:15px;
    padding:12px 28px;
    background:#3b82f6;
    border:none;
    border-radius:10px;
    font-size:16px;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

img{
    margin-top:20px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.status{
    font-size:28px;
    font-weight:bold;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>🦴 Pediatric Wrist Bone Fracture Detection</h1>
<p>YOLOv11 Deep Learning Model</p>

<div class="container">

<div class="card">
<h2>Upload X-ray</h2>

<form method="POST" enctype="multipart/form-data">
<div class="upload-box">
<input type="file" name="file" required>
</div>
<button type="submit">Analyze Image</button>
</form>
</div>

{% if uploaded %}
<div class="card">
<h2>Uploaded Image</h2>
<img src="{{ url_for('static', filename='uploads/' + uploaded) }}" width="320">
</div>
{% endif %}

{% if result %}
<div class="card">
<h2>Detection Result</h2>
<img src="{{ url_for('static', filename='results/output.jpg') }}" width="520">

<div class="status" style="color: {{color}}">
{{status}}
</div>
</div>
{% endif %}

</div>

</body>
</html>
